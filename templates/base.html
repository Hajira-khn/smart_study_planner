<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Smart Study Planner" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    <div class="sidebar">
      <div class="brand">Smart<span>Study</span></div>
      {% for icon, label, slug, endpoint in nav %}
        <a class="nav-item {{ 'active' if active == slug else '' }}" href="{{ url_for(endpoint) }}">
          <span class="nav-icon">{{ icon }}</span> {{ label }}
        </a>
      {% endfor %}
      <div class="sidebar-footer">
        {% if username %}Signed in as {{ username }}<br><a href="{{ url_for('logout') }}">Log out</a>{% endif %}
      </div>
    </div>
    <div class="main">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
